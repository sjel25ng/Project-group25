<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>velora.com</title>
  </head>

  <body>
    <main class="container">
      <header class="header">
        <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
        <img src="../images/logo.png" class="logo-large" alt="Logo 2" />
        <div>
          <button class="menu-btn">Menu</button>
          <button class="menu-btn">Cart</button>
        </div>
      </header>

      <!--Hero Section-->
      <section class="hero">
        <h1>Velora Festival 2026</h1>
        <p class="date">July 17-18, 2026</p>
        <button class="ticket-yellow">Tickets</button>
      </section>

      <!--Media Section-->
      <section class="media">
        <img src="../images/video.png" alt="Festival Video" />
        <img src="../images/festival_square.png" alt="Festival Image" />
      </section>
      <!--Text Section-->
      <section class="text">Experience an unforgettable weekend of music, energy, and pure joy in one of Sweden’s most iconic coastal destinations.
      </p>
      <p>Just beyond the gates, a vibrant world of restaurants, bars, and nightlife awaits — everything you need, all in one place.
      </p>
      </section>

      <!--Button Section-->

      <button class="ticket-pink">Tickets</button>
    </main>
  </body>
</html>
