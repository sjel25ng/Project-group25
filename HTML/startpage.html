<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>velora.com</title>
  </head>

  <body>
    <main class="container">
      <header class="header">
        <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
        <img src="../images/logo.png" class="logo-large" alt="Logo 2" />
        <div>
          <button class="menu-btn">Menu</button>
          <button class="menu-btn">Cart</button>
        </div>
      </header>

      <!--Hero Section-->
      <section class="hero">
        <p class="date">July 17-18, 2026</p>
        <button class="ticket-yellow">Tickets</button>
      </section>

      <!--Media Section-->
      <section class="gallery">
        <div class="top-images">
          <img src="../images/overview1.png" alt="Festival Overview Artists" />
          <img src="../images/overview2.png" alt="Festival Overview Map" />
        </div>

        <div class="bottom-image">
          <img src="../images/festival_square.png" alt="Festival Image" />
        </div>
      </section>

      <!--Text Section-->
      <section class="text">
        <p>
          Experience an unforgettable weekend of music, energy, and pure joy in
          one of Sweden’s most iconic coastal destinations.
        </p>
        <p>
          Just beyond the gates, a vibrant world of restaurants, bars, and
          nightlife awaits — everything you need, all in one place.
        </p>
      </section>

      <!--Button Section-->

      <button class="ticket-pink">Tickets</button>
    </main>
  </body>
</html>
