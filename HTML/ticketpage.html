<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>Tickets</title>
  </head>

  <body class="tickets-body">
    <main class="ticket-page">
      
      <header class="header">
        <div class="left">
          <a href="index.html">
            <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
          </a>
        </div>

        <div class="nav-center">
          <a href="index.html" class="menu-btn">Home</a>
          <a href="artists.html" class="menu-btn">Artists</a>
          <a href="ticketpage.html" class="menu-btn">Tickets</a>
          <a href="hotelpackages.html" class="menu-btn">Hotel packages</a>
        </div>

        <div class="nav-right">
          <a href="cart.html" class="menu-btn cart-link">
            Cart <span id="cart-count" class="cart-badge"></span>
          </a>
        </div>
      </header>

      <section class="ticket-hero">
        <p class="ticket-date">17-18 july</p>
        <h1>Tickets</h1>
      </section>
      <section class="ticket-list">
        <div class="ticket-row">
          <img
            src="../images/standard.png"
            alt="Ticket Standard"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Standard Friday & Saturday</h2>
            <p>3000kr</p>
          </div>
          <div class="ticket-actions">
            <input type="number" class="ticket-quantity" min="1" value="1" />
            <button
              class="add-cart-btn"
              data-name="Standard Friday & Saturday"
              data-price="3000"
            >
              Add to cart
            </button>
          </div>
        </div>
        <div class="ticket-row">
          <img
            src="../images/golden.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Golden Friday & Saturday</h2>
            <p>5000kr</p>
          </div>
          <div class="ticket-actions">
            <input type="number" class="ticket-quantity" min="1" value="1" />
            <button
              class="add-cart-btn"
              data-name="Golden Friday & Saturday"
              data-price="5000"
            >
              Add to cart
            </button>
          </div>
        </div>
        <div class="ticket-row">
          <img
            src="../images/table.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Table Friday & Saturday</h2>
            <p>8500kr & min. spend 1000kr/pers</p>
          </div>
          <div class="ticket-actions">
            <input type="number" class="ticket-quantity" min="1" value="1" />
            <button
              class="add-cart-btn"
              data-name="Table Friday & Saturday"
              data-price="8500"
            >
              Add to cart
            </button>
          </div>
        </div>
        <div class="ticket-row">
          <img
            src="../images/festival_square.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Standard Friday</h2>
            <p>1700kr</p>
          </div>
          <div class="ticket-actions">
            <input type="number" class="ticket-quantity" min="1" value="1" />
            <button
              class="add-cart-btn"
              data-name="Standard Friday"
              data-price="1700"
            >
              Add to cart
            </button>
          </div>
        </div>
        <div class="ticket-row">
          <img
            src="../images/festival_square.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Standard Saturday</h2>
            <p>1700kr</p>
          </div>
          <div class="ticket-actions">
            <input type="number" class="ticket-quantity" min="1" value="1" />
            <button
              class="add-cart-btn"
              data-name="Standard Saturday"
              data-price="1700"
            >
              Add to cart
            </button>
          </div>
        </div>
        <div class="ticket-row">
          <img
            src="../images/preparty.png"
            alt="Ticket Preparty"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Pre-Party</h2>
            <p>399kr</p>
          </div>
          <div class="ticket-actions">
            <input type="number" class="ticket-quantity" min="1" value="1" />
            <button class="add-cart-btn" data-name="Pre Party" data-price="399">
              Add to cart
            </button>
          </div>
        </div>
        <div class="ticket-row">
          <img
            src="../images/afterparty.png"
            alt="Ticket Afterparty"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>After-Party</h2>
            <p>499kr</p>
          </div>
          <div class="ticket-actions">
            <input type="number" class="ticket-quantity" min="1" value="1" />
            <button
              class="add-cart-btn"
              data-name="After Party"
              data-price="499"
            >
              Add to cart
            </button>
          </div>
        </div>
      </section>
    </main>
    <footer class="menu-footer">
      <a href="index.html">
        <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
      </a>

      <div class="socials">
        <a href="#">
          <img
            src="../images/instagram.png"
            class="socials-icon"
            alt="Instagram"
          />
        </a>
        <a href="#">
          <img
            src="../images/tiktoklogo.png"
            class="socials-icon"
            alt="TikTok"
          />
        </a>
        <a href="#">
          <img
            src="../images/youtubelogo.webp"
            class="socials-icon"
            alt="YouTube"
          />
        </a>
      </div>
    </footer>
    <script src="../JS/script.JS"></script>
  </body>
</html>
