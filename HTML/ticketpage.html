<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>Tickets</title>
  </head>

  <body class="tickets-body">
    <main class="ticket-page">
      <header class="header">
        <a href="index.html">
          <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
        </a>
        <a href="index.html">
          <img src="../images/logo.png" class="logo-large" alt="Logo 2" />
        </a>
        <div>
          <a href="menu.html" class="menu-btn">Menu</a>
          <a href="cart.html" class="menu-btn">Cart</a>
        </div>
      </header>
      <section class="ticket-hero">
        <p class="ticket-date">17-18 july</p>
        <h1>Tickets</h1>
      </section>
      <section class="ticket-list">
        <div class="ticket-row">
          <img
            src="../images/standard.png"
            alt="Ticket Standard"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Standard Friday & Saturday</h2>
            <p>3000kr</p>
          </div>
          <button>BUY NOW</button>
        </div>
        <div class="ticket-row">
          <img
            src="../images/golden.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Golden Friday & Saturday</h2>
            <p>5000kr</p>
          </div>
          <button>BUY NOW</button>
        </div>
        <div class="ticket-row">
          <img
            src="../images/table.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Table Friday & Saturday</h2>
            <p>8500kr & min. spend 1000kr/pers</p>
          </div>
          <button>BUY NOW</button>
        </div>
        <div class="ticket-row">
          <img
            src="../images/festival_square.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Standard Friday</h2>
            <p>1700kr</p>
          </div>
          <button>BUY NOW</button>
        </div>
        <div class="ticket-row">
          <img
            src="../images/festival_square.png"
            alt="Ticket Icon"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Standard Saturday</h2>
            <p>1700kr</p>
          </div>
          <button>BUY NOW</button>
        </div>
        <div class="ticket-row">
          <img
            src="../images/preparty.png"
            alt="Ticket Preparty"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>Pre-Party</h2>
            <p>399kr</p>
          </div>
          <button>BUY NOW</button>
        </div>
        <div class="ticket-row">
          <img
            src="../images/afterparty.png"
            alt="Ticket Afterparty"
            class="ticket-icon"
          />
          <div class="ticket-info">
            <h2>After-Party</h2>
            <p>499kr</p>
          </div>
          <button>BUY NOW</button>
        </div>
      </section>
    </main>
    <footer class="menu-footer">
      <a href="index.html">
        <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
      </a>

       <div class="socials">
        <a href="#">
          <img src="../images/instagram.png" class="socials-icon" alt="Instagram" />
        </a>
         <a href="#">
          <img src="../images/tiktoklogo.png" class="socials-icon" alt="TikTok" />
        </a>
         <a href="#">
          <img src="../images/youtubelogo.webp" class="socials-icon" alt="YouTube" />
        </a>
      </div>
    </footer>
  </body>
</html>
