<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>velora.com</title>
  </head>

  <body>
    <main class="container">
      <header class="header">
        <div class="left">
          <a href="index.html">
            <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
          </a>
        </div>

        <div class="center">
          <a href="index.html">
            <img src="../images/logo.png" class="logo-large" alt="Logo 2" />
          </a>
        </div>

        <div class="nav-right">
          <a href="menu.html" class="menu-btn">Menu</a>
          <a href="cart.html" class="menu-btn">Cart</a>
        </div>
      </header>

      <!--Hero Section-->
      <section class="hero">
        <p class="date">July 17-18, 2026</p>
      </section>

      <a href="ticketpage.html" class="ticket-yellow">Tickets</a>

      <!--Media Section-->
      <section class="gallery">
        <div class="top-images">
          <img src="../images/overview1.png" alt="Festival Overview Artists" />
          <img src="../images/overview2.png" alt="Festival Overview Map" />
        </div>

        <div class="bottom-image">
          <img src="../images/festival_square.png" alt="Festival Image" />
        </div>
      </section>

      <!--Text Section-->
      <section class="text">
        <p>
          Experience an unforgettable weekend of music, energy, and pure joy in
          one of Sweden’s most iconic coastal destinations.
        </p>
        <p>
          Just beyond the gates, a vibrant world of restaurants, bars, and
          nightlife awaits — everything you need, all in one place.
        </p>
      </section>

      <!--Button Section-->
      <a href="ticketpage.html" class="ticket-pink">Tickets</a>
    </main>
    <footer class="menu-footer">
      <a href="index.html">
        <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
      </a>

      <div class="socials">
        <a href="#">
          <img
            src="../images/instagram.png"
            class="socials-icon"
            alt="Instagram"
          />
        </a>
        <a href="#">
          <img
            src="../images/tiktoklogo.png"
            class="socials-icon"
            alt="TikTok"
          />
        </a>
        <a href="#">
          <img
            src="../images/youtubelogo.webp"
            class="socials-icon"
            alt="YouTube"
          />
        </a>
      </div>
    </footer>
  </body>
</html>
