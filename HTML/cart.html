<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>Your Cart</title>
  </head>

  <body class="cart-body">
    <main class="cart-page">
      <header class="header">
        <div class="left">
          <a href="index.html">
            <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
          </a>
        </div>

         <div class="nav-center">
          <a href="ticketpage.html" class="menu-btn">Tickets</a>
          <a href="hotelpackages.html" class="menu-btn">Hotel packages</a>
          <a href="contact.html" class="menu-btn">Contact</a>
          </div>

          <div class="nav-right">
          <a href="cart.html" class="menu-btn cart-link">
            Cart <span id="cart-count" class="cart-badge"></span>
          </a>
        </div>
      </header>

      <section class="cart-content">
        <div class="cart-title-row">
          <a href="index.html" class="black-arrow">←</a>
          <h1>Your Cart</h1>
        </div>
        <div id="cart-items"></div>
        <h2 class="total-price">Total: <span id="cart-total"></span></h2>

        <div class="cart-buttons">
          <button class="continue-btn">Continue Shopping</button>
          <button class="payment-btn">Go to Payment</button>
        </div>
      </section>

      <footer class="cart-footer">
        <a href="index.html">
          <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
        </a>

        <div class="socials">
          <span>Instagram</span>
          <span>FaceBook</span>
          <span>YouTube</span>
        </div>
      </footer>
    </main>
    <script src="../JS/script.JS"></script>
  </body>
</html>
