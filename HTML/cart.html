<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>Your Cart</title>
  </head>

  <body class="cart-body">
    <main class="cart-page">
      <header class="cart-header">
        <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
        <img
          src="../images/logo.png"
          class="ticket-logo-large"
          alt="Velora Festival"
        />
        <div class="cart-nav">
          <button class="menu-btn">Menu</button>
          <button class="menu-btn">Cart</button>
        </div>
      </header>
    <section class="cart-content">
        <div class="cart-title-row">
          <span class="black-arrow">←</span>
          <h1>Your Cart</h1>
        </div>

        <div class="cart-item">
          <img src="../images/festival_square.png" alt="Ticket Image" />
      <div class="cart-item-text">
        <h2>Standard Friday & Saturday</h2>
        <p>3000 kr</p>
      </div>
     </div>

     <h2 class="total-price">Total: 3000 kr</h2>

     <div class="cart-buttons">
      <button class="continue-btn">Continue Shopping</button>
      <button class="payment-btn">Go to Payment</button>
     </div>
   </section>

      <footer class="cart-footer">
        <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />

        <div class="socials">
          <span>Instagram</span>
          <span>FaceBook</span>
          <span>YouTube</span>
        </div>
      </footer>
    </main>
  </body>
</html>
