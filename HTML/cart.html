<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>Your Cart</title>
  </head>

  <body class="cart-body">
    <main class="cart-page">
      <header class="header">
        <div class="left">
          <a href="index.html">
            <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
          </a>
        </div>

        <div class="center">
          <a href="index.html">
            <img src="../images/logo.png" class="logo-large" alt="Logo 2" />
          </a>
        </div>

        <div class="nav-right">
          <a href="ticketpage.html" class="menu-btn">Tickets</a>
          <a href="hotelpackages.html" class="menu-btn">Hotel packages</a>
           <a href="contact.html" class="menu-btn">Contact</a>
          <a href="cart.html" class="menu-btn">Cart</a>
        </div>
      </header>
      
      <section class="cart-content">
        <div class="cart-title-row">
          <a href="index.html" class="black-arrow">←</a>
          <h1>Your Cart</h1>
        </div>

        <div class="cart-item">
          <img src="../images/festival_square.png" alt="Ticket Image" />
          <div class="cart-item-text">
            <h2>Standard Friday & Saturday</h2>
            <p>3000 kr</p>
          </div>
        </div>

        <h2 class="total-price">Total: 3000 kr</h2>

        <div class="cart-buttons">
          <button class="continue-btn">Continue Shopping</button>
          <button class="payment-btn">Go to Payment</button>
        </div>
      </section>

      <footer class="cart-footer">
        <a href="index.html">
          <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
        </a>

        <div class="socials">
          <span>Instagram</span>
          <span>FaceBook</span>
          <span>YouTube</span>
        </div>
      </footer>
    </main>
  </body>
</html>
