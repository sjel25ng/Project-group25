<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../CSS/main.css" />

    <title>Your Cart</title>
  </head>

  <body class="cart-body"></body>
  <body class="cart-body">
    <main class="cart-page">
       <header class="header">
        <div class="left">
          <a href="index.html">
            <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
          </a>
        </div>

        <div class="nav-center">
          <a href="index.html" class="menu-btn">Home</a>
          <a href="artists.html" class="menu-btn">Artists</a>
          <a href="ticketpage.html" class="menu-btn">Tickets</a>
          <a href="hotelpackages.html" class="menu-btn">Hotel packages</a>
        </div>

        <div class="nav-right">
          <a href="cart.html" class="menu-btn cart-link">
            Cart <span id="cart-count" class="cart-badge"></span>
          </a>
        </div>
      </header>

      <section class="cart-content">
        <div class="cart-title-row">
          <a href="index.html" class="black-arrow">←</a>
          <h1>Your Cart</h1>
        </div>
        <div id="cart-items"></div>
        <h2 class="total-price">Total: <span id="cart-total"></span></h2>
        <div class="cart-buttons">
          <a href="ticketpage.html" class="cart-btn continue-btn">
            Continue Shopping
          </a>
          <button class="cart-btn payment-btn disabled-btn">
            Go To Payment
          </button>
        </div>

        <div id="cart-items"></div>
        <span id="cart-total"></span>
      </section>

      <footer class="cart-footer">
        <a href="index.html">
          <img src="../images/logoall.png" class="logo-small" alt="Logo 1" />
        </a>

        <div class="socials">
        <a href="#">
          <img
            src="../images/instagram.png"
            class="socials-icon"
            alt="Instagram"
          />
        </a>
        <a href="#">
          <img
            src="../images/tiktoklogo.png"
            class="socials-icon"
            alt="TikTok"
          />
        </a>
        <a href="#">
          <img
            src="../images/youtubelogo.webp"
            class="socials-icon"
            alt="YouTube"
          />
        </a>
      </div>
      </footer>
    </main>
    <script src="../JS/script.JS"></script>
  </body>
</html>
